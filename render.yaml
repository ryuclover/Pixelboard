services:
  - type: web
    name: pixel-board-backend
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pixel-board-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://pixel-board-platform.vercel.app

databases:
  - name: pixel-board-db
    plan: free
    databaseName: pixelboard
    user: pixelboard
