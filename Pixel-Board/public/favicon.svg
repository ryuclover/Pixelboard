<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Checkered background resembling a board square -->
  <rect width="16" height="16" fill="#f1ebd4"/>
  <rect x="0" y="0" width="8" height="8" fill="#7d8f58"/>
  <rect x="8" y="8" width="8" height="8" fill="#7d8f58"/>
  <rect x="8" y="0" width="8" height="8" fill="#f1ebd4"/>
  <rect x="0" y="8" width="8" height="8" fill="#f1ebd4"/>
  
  <!-- Shadow of the piece -->
  <rect x="4" y="14" width="10" height="2" fill="rgba(0,0,0,0.4)"/>
  
  <!-- Pixel art pawn -->
  <!-- Base -->
  <rect x="3" y="12" width="10" height="2" fill="#2a2a2a"/>
  <!-- Stem -->
  <rect x="5" y="10" width="6" height="2" fill="#2a2a2a"/>
  <rect x="6" y="7" width="4" height="3" fill="#2a2a2a"/>
  <!-- Collar -->
  <rect x="4" y="7" width="8" height="1" fill="#2a2a2a"/>
  <!-- Head -->
  <rect x="5" y="3" width="6" height="4" fill="#2a2a2a"/>
  <rect x="6" y="2" width="4" height="1" fill="#2a2a2a"/>
  
  <!-- Highlights -->
  <rect x="6" y="3" width="2" height="1" fill="#6a6a6a"/>
  <rect x="5" y="4" width="1" height="2" fill="#6a6a6a"/>
  <rect x="4" y="12" width="1" height="1" fill="#6a6a6a"/>
</svg>